name: loongarch64-release

on:
  push:
    tags:
      - "rust-loongarch64-v*.*.*"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream Codex release tag, for example rust-v0.145.0"
        required: true
        type: string
      publish_release:
        description: "Publish or update the LoongArch64 GitHub release."
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}::${{ inputs.upstream_tag || github.ref }}
  cancel-in-progress: false

env:
  LLVM_TOOLCHAIN_URL: https://github.com/zarraxx/develop_suit/releases/download/clang-22.1.8/clang-22.1.8-x86_64-unknown-linux-gnu.tar.xz
  RUSTY_V8_MIRROR: https://github.com/zarraxx/rusty_v8/releases/download
  TARGET: loongarch64-unknown-linux-gnu
  UPSTREAM_REPO: openai/codex

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.context.outputs.upstream_tag }}
      version: ${{ steps.context.outputs.version }}
      release_tag: ${{ steps.context.outputs.release_tag }}
      release_name: ${{ steps.context.outputs.release_name }}
      publish_release: ${{ steps.context.outputs.publish_release }}

    steps:
      - name: Resolve build context
        id: context
        shell: bash
        env:
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail

          input_tag="${INPUT_UPSTREAM_TAG}"
          if [[ -z "${input_tag}" && "${GITHUB_REF_NAME}" == rust-loongarch64-v* ]]; then
            input_tag="rust-v${GITHUB_REF_NAME#rust-loongarch64-v}"
          fi

          if [[ -z "${input_tag}" ]]; then
            echo "missing upstream tag; set workflow_dispatch input upstream_tag" >&2
            exit 1
          fi

          upstream_git_url="https://github.com/${UPSTREAM_REPO}.git"
          if git ls-remote --exit-code --tags "${upstream_git_url}" "refs/tags/${input_tag}" >/dev/null 2>&1; then
            upstream_tag="${input_tag}"
          elif git ls-remote --exit-code --tags "${upstream_git_url}" "refs/tags/rust-v${input_tag}" >/dev/null 2>&1; then
            upstream_tag="rust-v${input_tag}"
          elif git ls-remote --exit-code --tags "${upstream_git_url}" "refs/tags/v${input_tag}" >/dev/null 2>&1; then
            upstream_tag="v${input_tag}"
          else
            echo "could not find upstream release tag: ${input_tag}" >&2
            exit 1
          fi

          if [[ "${upstream_tag}" == rust-v* ]]; then
            version="${upstream_tag#rust-v}"
          elif [[ "${upstream_tag}" == v* ]]; then
            version="${upstream_tag#v}"
          else
            version="${upstream_tag}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid upstream release version: ${version}" >&2
            exit 1
          fi

          publish_release="${INPUT_PUBLISH_RELEASE:-true}"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            publish_release=true
          fi

          release_tag="rust-loongarch64-v${version}"
          release_name="${version} loongarch64"

          echo "Upstream tag: ${upstream_tag}"
          echo "LoongArch64 release tag: ${release_tag}"
          echo "Publish release: ${publish_release}"
          echo "upstream_tag=${upstream_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "publish_release=${publish_release}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-context
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout upstream release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.resolve-context.outputs.upstream_tag }}
          path: upstream
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout fork tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: fork-tools
          fetch-depth: 1
          persist-credentials: false

      - name: Inject fork patches and scripts
        shell: bash
        run: |
          set -euo pipefail

          rm -rf upstream/fork_patches
          cp -a fork-tools/fork_patches upstream/fork_patches
          find upstream/fork_patches/scripts -type f -name '*.sh' -exec chmod +x {} +

          cd upstream
          if compgen -G "fork_patches/upstream/*.patch" >/dev/null; then
            for patch in fork_patches/upstream/*.patch; do
              echo "Applying ${patch}"
              git apply "${patch}"
            done
          else
            echo "No upstream source patches to apply."
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            curl \
            mmdebstrap \
            patchelf \
            xz-utils

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail

          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' upstream/codex-rs/rust-toolchain.toml | head -n 1)"
          if [[ -z "${toolchain}" ]]; then
            echo "cannot determine Rust toolchain from upstream/codex-rs/rust-toolchain.toml" >&2
            exit 1
          fi

          rustup toolchain install "${toolchain}" \
            --profile minimal \
            --component rust-src \
            --target "${TARGET}"
          rustup target add "${TARGET}" --toolchain "${toolchain}"

      - name: Download LLVM toolchain
        shell: bash
        run: |
          set -euo pipefail
          archive_path="${RUNNER_TEMP}/clang-22.1.8-x86_64-unknown-linux-gnu.tar.xz"
          extract_root="${RUNNER_TEMP}/llvm-toolchain"
          mkdir -p "${extract_root}"
          curl -fsSL "${LLVM_TOOLCHAIN_URL}" -o "${archive_path}"
          tar -C "${extract_root}" -xf "${archive_path}"
          toolchain_root="$(find "${extract_root}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          echo "LLVM_TOOLCHAIN_ROOT=${toolchain_root}" >> "$GITHUB_ENV"

      - name: Prepare Debian 13 LoongArch64 sysroot
        shell: bash
        run: |
          set -euo pipefail
          sysroot_dir="${RUNNER_TEMP}/debian13-loong64-sysroot"
          sudo env SYSROOT="${sysroot_dir}" upstream/fork_patches/scripts/prepare_debian13_loongarch64_sysroot.sh
          sudo chown -R "$(id -u):$(id -g)" "${sysroot_dir}"
          echo "SYSROOT=${sysroot_dir}" >> "$GITHUB_ENV"

      - name: Cross-build codex-cli
        shell: bash
        run: |
          set -euo pipefail
          build_log="${RUNNER_TEMP}/codex-loongarch64-release.log"
          PROFILE=release \
          LLVM_TOOLCHAIN_ROOT="${LLVM_TOOLCHAIN_ROOT}" \
          SYSROOT="${SYSROOT}" \
          OPENSSL_SYSROOT="${SYSROOT}" \
          RUSTY_V8_MIRROR="${RUSTY_V8_MIRROR}" \
          BUILD_LOG="${build_log}" \
          upstream/fork_patches/scripts/build_codex_cli_loongarch64.sh
          echo "BUILD_LOG=${build_log}" >> "$GITHUB_ENV"

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive_path="${RUNNER_TEMP}/codex-${TARGET}-release.tar.xz"
          PROFILE=release \
          LLVM_TOOLCHAIN_ROOT="${LLVM_TOOLCHAIN_ROOT}" \
          PATCHELF_BIN=patchelf \
          ARCHIVE_PATH="${archive_path}" \
          DIST_DIR="${RUNNER_TEMP}/codex-${TARGET}-release" \
          upstream/fork_patches/scripts/package_codex_cli_loongarch64.sh
          sha256sum "${archive_path}" > "${archive_path}.sha256"
          cp "${archive_path}" dist/
          cp "${archive_path}.sha256" dist/
          cp "${BUILD_LOG}" dist/

      - name: Upload LoongArch64 artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: loongarch64-release-artifacts
          path: dist/*
          if-no-files-found: error

  smoke-test:
    needs:
      - resolve-context
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout fork tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: fork-tools
          fetch-depth: 1
          persist-credentials: false

      - name: Enable LoongArch64 QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: loong64

      - name: Download LoongArch64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: loongarch64-release-artifacts
          path: dist

      - name: Smoke-test codex-cli in Debian trixie container
        shell: bash
        run: |
          set -euo pipefail
          archive_path="$(find dist -maxdepth 1 -name 'codex-loongarch64-unknown-linux-gnu-release.tar.xz' | head -n 1)"
          if [[ -z "${archive_path}" ]]; then
            echo "missing LoongArch64 release archive in dist/" >&2
            exit 1
          fi

          CONTAINER_ENGINE=docker \
          ARCHIVE_PATH="${archive_path}" \
          fork-tools/fork_patches/scripts/smoke_test_codex_cli_loongarch64_container.sh

  publish-release:
    needs:
      - resolve-context
      - build
      - smoke-test
    if: ${{ needs.resolve-context.outputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download LoongArch64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: loongarch64-release-artifacts
          path: dist

      - name: Prepare release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ needs.resolve-context.outputs.upstream_tag }}
        run: |
          set -euo pipefail

          notes_path="${RUNNER_TEMP}/release-notes.md"
          upstream_url="https://github.com/${UPSTREAM_REPO}/releases/tag/${UPSTREAM_TAG}"
          upstream_release_name="$(
            gh api "repos/${UPSTREAM_REPO}/releases/tags/${UPSTREAM_TAG}" --jq '.name // ""' 2>/dev/null || true
          )"

          {
            printf 'Built from upstream Codex release: [%s](%s)\n' "${UPSTREAM_TAG}" "${upstream_url}"
            if [[ -n "${upstream_release_name}" ]]; then
              printf '\nUpstream release name: %s\n' "${upstream_release_name}"
            fi
            printf '\n## LoongArch64 (Debian 13)\n\n'
            printf '%s\n' \
              'This release adds `codex-loongarch64-unknown-linux-gnu-release.tar.xz`, built' \
              'with LLVM 22.1.8 and a Debian 13 (Trixie) LoongArch64 sysroot.'
            printf '\nRuntime notes:\n'
            printf '%s\n' \
              '- `libc++.so.1`, `libc++abi.so.1`, and `libunwind.so.1` are bundled.' \
              '- OpenSSL is expected from the target system.'
            printf '\nInstall on Debian 13:\n'
            printf '%s\n' \
              '```bash' \
              'sudo apt update' \
              'sudo apt install -y ca-certificates libssl3t64' \
              'tar -xf codex-loongarch64-unknown-linux-gnu-release.tar.xz' \
              './codex-loongarch64-unknown-linux-gnu-release/bin/codex' \
              '```'
          } > "${notes_path}"

      - name: Upload LoongArch64 assets to GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ${{ needs.resolve-context.outputs.release_name }}
          tag_name: ${{ needs.resolve-context.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: dist/*
          overwrite_files: true
          make_latest: false
          prerelease: false
